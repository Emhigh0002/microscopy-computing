version: '3.8'

services:
  platform:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres123@db:5432/microscopy
      - SECRET_KEY=prod-secret-key-to-override-for-security
      - UPLOAD_DIR=/workspace/data/uploads
      - REPORTS_DIR=/workspace/data/reports
      - MODEL_DIR=/workspace/data/models
    volumes:
      - platform-data:/workspace/data
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres123
      - POSTGRES_DB=microscopy
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data

volumes:
  platform-data:
  pg-data:
